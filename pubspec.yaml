name: kigali_city_directory
description: "A new Flutter project."

# I’m keeping this project from being published to pub.dev by accident.
# This is mainly because this is a private school project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# This is where I set the app version and build number.
# I can override these later when I build releases.
version: 1.0.0+1

environment:
  sdk: ^3.10.8

# These are the packages my app needs to run.
# If I want to update them later, I can use `flutter pub upgrade`.
dependencies:
  flutter:
    sdk: flutter

  # I’m using these icons for iOS-style symbols when I need them.
  cupertino_icons: ^1.0.8

  # Core app dependencies
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  uuid: ^4.5.1
  google_maps_flutter: ^2.12.0
  url_launcher: ^6.3.1
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # I’m using these lint rules to help keep my code clean.
  flutter_lints: ^6.0.0

# If I need help with pubspec formatting, I use the Dart docs.

# Everything below here is Flutter-specific settings.
flutter:

  # This makes sure Material icons are available in my app.
  uses-material-design: true

  # If I want to add images, I’ll list them under assets like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # Flutter also supports different image resolutions if I need that.

  # If an asset comes from a package, Flutter has a specific way to reference it.

  # If I want custom fonts, I’ll configure them here, for example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # If fonts come from a package, Flutter docs explain how to do that too.
