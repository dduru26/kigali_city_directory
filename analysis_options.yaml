# I use this file to configure the Dart analyzer so it can check my code for
# errors, warnings, and lint issues.
#
# Whatever the analyzer finds shows up in my IDE, and I can also run it myself
# using `flutter analyze`.

# This line turns on the recommended Flutter lint rules so my code style stays
# reasonable.
include: package:flutter_lints/flutter.yaml

linter:
  # I can customize lint rules below by disabling some or enabling extra ones.
  # The full list is here: https://dart.dev/lints
  #
  # If I only want to ignore a lint in one place, I can use `// ignore:` or
  # `// ignore_for_file:` in the Dart file.
  rules:
    # avoid_print: false  # Uncomment to disable the `avoid_print` rule
    # prefer_single_quotes: true  # Uncomment to enable the `prefer_single_quotes` rule

# If I need more details about this file, I check:
# https://dart.dev/guides/language/analysis-options
